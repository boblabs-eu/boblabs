  <meta property="og:type" content="website" />

  <meta property="og:title" content="Bob Manager — Self-hosted AI Orchestration" />

  <meta property="og:image" content="https://lab.boblabs.eu/assets/agent_templates.png" />

  <!-- Twitter -->

  <link rel="alternate" type="text/markdown" href="/llms.txt" title="LLM-friendly summary" />

  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme bootstrap — applies the saved accent theme before React mounts so there
       is no flash of the default theme on reload. Mirrors the picker in Sidebar.js. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('bob_theme');
        if (t && /^(blue|red|green|grey)$/.test(t)) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) { /* localStorage unavailable — keep default theme */ }
    })();
  </script>

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Bob Manager",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Linux (self-hosted)",
    "url": "https://lab.boblabs.eu/",
    "publisher": {
      "@type": "Organization",
      "name": "Bob Labs",
      "url": "https://boblabs.eu",
      "email": "support@boblabs.eu"
    },
    "description": "Self-hosted AI orchestration platform: agents, GPU pipelines and custom automation labs."
  }
  </script>

  <!-- Plausible analytics (privacy-friendly, no cookie banner needed). -->
  <script defer data-domain="lab.boblabs.eu" src="https://plausible.io/js/script.outbound-links.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
