# Crawler detection — match against User-Agent. Bots get prerendered HTML
# (per-route OG cards, JSON-LD, readable body); real users get the SPA.
# Keep this list narrow on purpose: only known social-unfurl + search +
# LLM-search crawlers.
map $http_user_agent $is_seo_bot {
    default                              0;
    "~*facebookexternalhit"              1;
    "~*Facebot"                          1;
    "~*Twitterbot"                       1;
    "~*LinkedInBot"                      1;
    "~*Slackbot"                         1;
    "~*Slack-ImgProxy"                   1;
    "~*Discordbot"                       1;
    "~*WhatsApp"                         1;
    "~*TelegramBot"                      1;
    "~*Pinterest"                        1;
    "~*Googlebot"                        1;
    "~*Google-InspectionTool"            1;
    "~*Google-Extended"                  1;
    "~*bingbot"                          1;
    "~*DuckDuckBot"                      1;
    "~*Applebot"                         1;
    "~*Applebot-Extended"                1;
    "~*YandexBot"                        1;
    "~*Baiduspider"                      1;
    "~*ClaudeBot"                        1;
    "~*Claude-Web"                       1;
    "~*GPTBot"                           1;
    "~*OAI-SearchBot"                    1;
    "~*ChatGPT-User"                     1;
    "~*PerplexityBot"                    1;
    "~*MistralAI"                        1;
    "~*Meta-ExternalAgent"               1;
    "~*Meta-ExternalFetcher"             1;
    "~*CCBot"                            1;
}

server {
    listen 80;
    server_name lab.boblabs.eu;
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Public static docs (markdown files) ──
    location /docs-md/ {
        alias /usr/share/nginx/html/docs-md/;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── SEO surfaces — always proxied to bob-api (dynamic) ──
    location = /sitemap.xml {
        proxy_pass http://bob-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /rss.xml {
        proxy_pass http://bob-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /og/blog/ {
        proxy_pass http://bob-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static SEO files (still served from disk) ──
    location = /robots.txt  { add_header Cache-Control "public, max-age=3600"; }
    location = /humans.txt  { add_header Cache-Control "public, max-age=86400"; }
    location = /llms.txt    { add_header Cache-Control "public, max-age=3600"; types { } default_type text/markdown; }
    location = /AGENTS.md   { add_header Cache-Control "public, max-age=3600"; types { } default_type text/markdown; }

    # ── Public API endpoints (no auth required) ──
    location /api/v1/public/ {
        proxy_pass http://bob-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Protected API — require Authorization header ──
    location /api/ {
        if ($http_authorization = '') {
            return 401 '{"detail":"Authentication required"}';
        }
        proxy_pass http://bob-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
        chunked_transfer_encoding on;
    }

    # ── Protected WebSocket — require auth ──
    location /ws/agent {
        if ($http_authorization = '') {
            return 401 '{"detail":"Authentication required"}';
        }
        proxy_pass http://bob-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Client WebSocket — browser WS API cannot send headers ──
    location /ws/client {
        proxy_pass http://bob-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── /blog and /blog/<slug> — bots get prerendered HTML, humans get SPA ──
    # Use a named location for the bot path so we don't trip nginx's "if is evil" rules.
    location ~ ^/blog(/.*)?$ {
        if ($is_seo_bot) {
            rewrite ^ /_blog_prerender last;
        }
        try_files $uri $uri/ /index.html;
    }

    location /_blog_prerender {
        internal;
        proxy_pass http://bob-api:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── SPA routing ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}

